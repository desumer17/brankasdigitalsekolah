<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brankas Digital - SDN 17 Dauh Puri</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --primary: #00a884; --text: #fff; --sub: #8b949e; --border: #30363d; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        .hidden { display: none !important; }
        input, button, select { width: 100%; box-sizing: border-box; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        button { background: var(--primary); color: #000; font-weight: bold; border: none; cursor: pointer; }
        button:hover { opacity: 0.8; }
        
        /* LOGIN */
        #login-page { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .login-box { background: var(--card); padding: 40px 30px; border-radius: 20px; text-align: center; width: 100%; max-width: 350px; border: 1px solid var(--border); }
        .login-box img { width: 80px; margin-bottom: 10px; }
        .login-box h2 { margin: 0; color: var(--primary); }
        .login-box p { margin: 5px 0 25px; color: var(--sub); font-size: 14px; }
        .footer { margin-top: 30px; color: var(--sub); font-size: 12px; }

        /* DASHBOARD */
        #dashboard-page { padding: 20px; max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .card i { font-size: 30px; color: var(--primary); margin-bottom: 10px; }
        .card h3 { font-size: 14px; margin: 0; }
        
        /* FOLDER VIEW & MODALS */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 15px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--bg); margin-bottom: 8px; border-radius: 8px; }
        .file-item a { color: var(--text); text-decoration: none; font-size: 14px; flex: 1;}
        .action-btns button { width: auto; padding: 6px 12px; margin: 0 0 0 5px; font-size: 12px; }

/* --- DESAIN TOMBOL PENGUBAH TAMPILAN --- */
        .view-switcher { display: flex; justify-content: flex-end; gap: 6px; margin-bottom: 15px; }
        .view-btn { width: auto; padding: 6px 12px; margin-bottom: 0; background: var(--card); border: 1px solid var(--border); color: var(--sub); font-size: 12px; font-weight: 500; border-radius: 6px; transition: 0.2s; }
        .view-btn.active { background: var(--primary); color: #000; font-weight: bold; border-color: var(--primary); }

        /* LOGIKAL LAYOUT 1: GRID VIEW (STANDAR DESKTOP) */
        .grid.view-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .grid.view-grid .card { height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .grid.view-grid .card i { font-size: 26px; margin-bottom: 8px; }
        .grid.view-grid .card h3 { font-size: 13px; text-align: center; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; }

        /* LOGIKAL LAYOUT 2: LARGE VIEW (BESAR DESKTOP) */
        .grid.view-large { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .grid.view-large .card { height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; }
        .grid.view-large .card i { font-size: 40px; margin-bottom: 12px; }
        .grid.view-large .card h3 { font-size: 15px; text-align: center; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; }

        /* LOGIKAL LAYOUT 3: LIST VIEW (BARIS DESKTOP - COCOK UNTUK TEKS PANJANG) */
        .grid.view-list { grid-template-columns: 1fr; gap: 8px; }
        .grid.view-list .card { height: 55px; display: flex; flex-direction: row; justify-content: flex-start; align-items: center; padding: 0 20px; text-align: left; }
        .grid.view-list .card i { font-size: 20px; margin-bottom: 0; margin-right: 15px; }
        .grid.view-list .card h3 { font-size: 14px; text-align: left; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; }
        
        /* --- OPTIMASI ULTRA COMPACT & ELEGAN KHUSUS LAYAR HP --- */
@media (max-width: 480px) {
    /* 1. HALAMAN LOGIN: dibuat mini, melayang anggun di tengah */
    #login-page { padding: 10px; }
    .login-box { 
        width: 82%; 
        max-width: 270px; /* Membatasi lebar kotak login agar tidak memenuhi layar */
        padding: 25px 20px; 
        border-radius: 16px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
    .login-box img { 
        width: 50px; /* Logo sekolah dibuat imut dan pas */
        margin-bottom: 8px; 
    }
    .login-box h2, .login-box p { 
        font-size: 15px !important; /* Ukuran teks sekecil aplikasi native, sangat elegan */
        line-height: 1.3;
    }
    .login-box p { margin: 3px 0 15px; }
    
    /* Input & Tombol Login yang Tipis & Rapit */
    input, button, select { 
        padding: 8px 12px; 
        font-size: 13px; 
        margin-bottom: 8px; 
        border-radius: 6px;
    }
    .footer { margin-top: 15px; font-size: 10px; opacity: 0.7; }

    /* 2. DASHBOARD UTAMA: Padat & Presisi */
    #dashboard-page { padding: 12px; }
    .header { margin-bottom: 15px; padding-bottom: 10px; }
    .header h2 { font-size: 16px; }
    #user-info { font-size: 11px; }
    .header button { padding: 5px 10px; font-size: 11px; border-radius: 6px; }
    
    /* RESPONSIVE SWITCHER DI HP */
    .view-switcher { margin-bottom: 10px; }
    .view-btn { padding: 5px 10px; font-size: 11px; }

    /* =======================================================
       HP - 1. TAMPILAN GRID (3 KOLOM BERJEJER - SUPER RINGKAS)
       ======================================================= */
    .grid.view-grid { 
        grid-template-columns: repeat(3, 1fr); 
        gap: 8px; 
    }
    .grid.view-grid .card { 
        height: 80px; 
        padding: 8px 4px; 
    }
    .grid.view-grid .card i { 
        font-size: 18px; 
        margin-bottom: 3px; 
    }
    .grid.view-grid .card h3 { 
        font-size: 10px; 
        display: -webkit-box; 
        -webkit-line-clamp: 2; 
        -webkit-box-orient: vertical; 
        overflow: hidden; 
        text-overflow: ellipsis;
    }

    /* =======================================================
       HP - 2. TAMPILAN LARGE / BESAR (2 KOLOM BERJEJER - LEGA)
       ======================================================= */
    .grid.view-large { 
        grid-template-columns: repeat(2, 1fr); 
        gap: 12px; 
    }
    .grid.view-large .card { 
        height: 110px; 
        padding: 12px 8px; 
    }
    .grid.view-large .card i { 
        font-size: 28px; 
        margin-bottom: 6px; 
    }
    .grid.view-large .card h3 { 
        font-size: 12px; 
        font-weight: bold;
        display: -webkit-box; 
        -webkit-line-clamp: 2; 
        -webkit-box-orient: vertical; 
        overflow: hidden; 
        text-overflow: ellipsis;
    }

    /* =======================================================
       HP - 3. TAMPILAN LIST (1 KOLOM KE BAWAH DENGAN DETAIL)
       ======================================================= */
    .grid.view-list { 
        grid-template-columns: 1fr; 
        gap: 6px; 
    }
    .grid.view-list .card { 
        height: 50px; 
        padding: 0 15px; 
        flex-direction: row; 
        justify-content: flex-start; 
        text-align: left;
    }
    .grid.view-list .card i { 
        font-size: 18px; 
        margin-bottom: 0; 
        margin-right: 12px; 
    }
    .grid.view-list .card h3 { 
        font-size: 12px; 
        text-align: left;
        display: -webkit-box; 
        -webkit-line-clamp: 1; 
        vertical-align: middle;
        overflow: hidden; 
        text-overflow: ellipsis;
    }
    
    /* 3. MODAL / POP-UP FORM & UPLOAD */
    .modal { padding: 8px; }
    .modal-content { padding: 12px; border-radius: 12px; }
    .modal-content h2 { font-size: 15px; }
    .modal-content h4 { font-size: 12px; margin: 10px 0 5px; }
    #search-bar { padding: 8px; font-size: 12px; margin-bottom: 10px; }
    
    /* Daftar File di Dalam Brankas */
    .file-item { padding: 6px 8px; margin-bottom: 5px; }
    .file-item a { font-size: 12px; }
    .action-btns button { padding: 4px 8px; font-size: 10px; }
}
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-box">
            <img src="logo-sekolah.png" alt="Logo Sekolah SDN 17 Dauh Puri">
            <h2>Brankas Digital</h2>
            <p>SD Negeri 17 Dauh Puri</p>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Masuk</button>
        </div>
        <div class="footer">Copyright 2026 3D Creative</div>
    </div>

    <div id="dashboard-page" class="hidden">
        <div class="header">
            <div>
                <h2 style="margin:0; color:var(--primary);">Dashboard</h2>
                <span id="user-info" style="color:var(--sub); font-size:14px;"></span>
            </div>
            <div>
                <button id="btn-admin" class="hidden" onclick="openAdminModal()" style="width:auto; margin-right:10px;">+ Tambah Brankas</button>
                <button onclick="location.reload()" style="width:auto; background:#d73a49; color:#fff;">Keluar</button>
            </div>
        </div>

        <div class="view-switcher">
            <button id="btn-view-grid" class="view-btn active" onclick="changeView('grid')"><i class="fas fa-th"></i> Grid</button>
            <button id="btn-view-large" class="view-btn" onclick="changeView('large')"><i class="fas fa-th-large"></i> Besar</button>
            <button id="btn-view-list" class="view-btn" onclick="changeView('list')"><i class="fas fa-list"></i> List</button>
        </div>

        <div class="grid view-grid" id="menu-grid"></div>
        
        <div class="grid" id="menu-grid"></div>
    </div>

    <div id="folder-modal" class="modal hidden">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between;">
                <h2 id="folder-title" style="margin-top:0;">Nama Brankas</h2>
                <i class="fas fa-times" style="cursor:pointer; font-size:20px;" onclick="closeModal('folder-modal')"></i>
            </div>
            
            <div style="background:var(--bg); padding:15px; border-radius:10px; margin-bottom:20px;">
                <h4 style="margin-top:0;">Upload Berkas</h4>
                <input type="text" id="up-nama" placeholder="Nama Berkas (Cth: Laporan Nilai)">
                <input type="date" id="up-tanggal">
                <input type="file" id="up-files" multiple>
                <button onclick="uploadFiles()">Upload Sekarang</button>
                <div id="upload-status" style="font-size:12px; color:var(--primary);"></div>
            </div>

            <input type="text" id="search-bar" placeholder="Cari berkas..." onkeyup="filterFiles()">
            <div id="file-list">Mencari berkas...</div>
        </div>
    </div>

    <div id="admin-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Tambah Brankas / Ikon Baru</h2>
            <input type="text" id="new-nama" placeholder="Nama Brankas (Cth: Prestasi Siswa)">
            <input type="text" id="new-icon" placeholder="Kode Ikon FontAwesome (Cth: fa-trophy)">
            <select id="new-tipe">
                <option value="folder">Folder Google Drive</option>
                <option value="link">Link Web Aplikasi Lain</option>
            </select>
            <input type="text" id="new-target" placeholder="ID Folder Drive / Tautan URL">
            <button onclick="simpanBrankasBaru()">Simpan Brankas</button>
            <button style="background:transparent; border:1px solid var(--border); color:var(--text);" onclick="closeModal('admin-modal')">Batal</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwF_oVdNGmEcHqmj2wgSGFDdewAWdqkvFgYtVw9QxKpo5oW8azROlYM73b4hopW0XMfJg/exec";
        
        let currentUser = {};
        let currentFolderId = "";
        let currentFolderName = "";
        let filesData = [];

        async function fetchAPI(action, payload = {}) {
            payload.action = action;
            let res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
            return await res.json();
        }

        // --- LOGIN & RENDER MENU ---
        async function login() {
            let u = document.getElementById('username').value;
            let p = document.getElementById('password').value;
            if(!u || !p) return alert("Isi form!");
            
            let btn = event.target; btn.innerText = "Memproses...";
            let res = await fetchAPI("login", { username: u, password: p });
            
            if(res.status === "SUCCESS") {
                currentUser = res.data.user;
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('dashboard-page').classList.remove('hidden');
                document.getElementById('user-info').innerText = `${currentUser.nama} (${currentUser.peran})`;
                
                if(currentUser.peran === "SuperAdmin") document.getElementById('btn-admin').classList.remove('hidden');

                // Render Brankas
                let grid = document.getElementById('menu-grid');
                grid.innerHTML = "";
                
                // Tambahkan Brankas Pribadi jika punya ID
                if(currentUser.personalFolder) {
                    res.data.brankas.unshift({nama: "Brankas Pribadi", icon: "fa-user-lock", tipe: "folder", target: currentUser.personalFolder});
                }

                res.data.brankas.forEach(b => {
                    grid.innerHTML += `
                        <div class="card" onclick="openBrankas('${b.tipe}', '${b.target}', '${b.nama}')">
                            <i class="fas ${b.icon}"></i>
                            <h3>${b.nama}</h3>
                        </div>`;
                });
            } else { alert(res.message); btn.innerText = "Masuk"; }
        }

        // --- BUKA MENU BRANKAS ---
        async function openBrankas(tipe, target, nama) {
            if(tipe === "link") return window.open(target, '_blank');
            
            currentFolderId = target;
            currentFolderName = nama;
            document.getElementById('folder-title').innerText = nama;
            document.getElementById('folder-modal').classList.remove('hidden');
            document.getElementById('file-list').innerHTML = "Memuat file...";
            
            let res = await fetchAPI("getFiles", { folderId: target });
            if(res.status === "SUCCESS") {
                filesData = res.data;
                renderFiles(filesData);
            }
        }

        function renderFiles(list) {
            let html = "";
            list.forEach(f => {
                html += `
                <div class="file-item">
                    <a href="${f.url}" target="_blank"><i class="fas fa-file"></i> ${f.nama}</a>
                    <div class="action-btns">
                        <button onclick="downloadFile('${f.id}', '${f.nama}')" style="background:#2ea043; color:white;"><i class="fas fa-download"></i></button>
                    </div>
                </div>`;
            });
            document.getElementById('file-list').innerHTML = html || "Tidak ada berkas.";
        }

        function filterFiles() {
            let q = document.getElementById('search-bar').value.toLowerCase();
            let filtered = filesData.filter(f => f.nama.toLowerCase().includes(q));
            renderFiles(filtered);
        }

        // --- UPLOAD MULTIPLE & AUTO RENAME & KOMPRES ---
        async function uploadFiles() {
            let files = document.getElementById('up-files').files;
            let nama = document.getElementById('up-nama').value;
            let tgl = document.getElementById('up-tanggal').value;
            
            if(files.length === 0) return alert("Pilih berkas!");
            let statusEl = document.getElementById('upload-status');
            
            for(let i=0; i<files.length; i++) {
                let file = files[i];
                let ext = file.name.split('.').pop();
                let formatNama = nama ? `${currentFolderName}_${nama}_${tgl}.${ext}` : file.name;
                statusEl.innerText = `Mengunggah berkas ${i+1} dari ${files.length}...`;

                let base64 = await processFile(file);
                await fetchAPI("upload", {
                    folderId: currentFolderId,
                    fileName: formatNama,
                    mimeType: file.type || 'application/octet-stream',
                    base64: base64
                });
            }
            statusEl.innerText = "Semua unggahan berhasil!";
            openBrankas('folder', currentFolderId, currentFolderName); // Refresh
        }

        function processFile(file) {
            return new Promise((resolve) => {
                let reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function(e) {
                    if(file.type.startsWith('image/')) {
                        let img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            let canvas = document.createElement('canvas');
                            let ctx = canvas.getContext('2d');
                            let MAX_W = 1200, MAX_H = 1200;
                            let w = img.width, h = img.height;
                            if (w > h && w > MAX_W) { h *= MAX_W/w; w = MAX_W; }
                            else if (h > MAX_H) { w *= MAX_H/h; h = MAX_H; }
                            canvas.width = w; canvas.height = h;
                            ctx.drawImage(img, 0, 0, w, h);
                            let compressed = canvas.toDataURL('image/jpeg', 0.75);
                            resolve(compressed.split(',')[1]);
                        }
                    } else {
                        resolve(e.target.result.split(',')[1]);
                    }
                }
            });
        }

        // --- DOWNLOAD FILE BYPASS LOGIN ---
        async function downloadFile(id, nama) {
            let res = await fetchAPI("download", { fileId: id });
            if(res.status === "SUCCESS") {
                let a = document.createElement('a');
                a.href = "data:" + res.data.mimeType + ";base64," + res.data.base64;
                a.download = res.data.nama;
                a.click();
            } else { alert("Gagal unduh file."); }
        }

        // --- ADMIN MENU ---
        function openAdminModal() { document.getElementById('admin-modal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        
        async function simpanBrankasBaru() {
            let data = {
                nama: document.getElementById('new-nama').value,
                icon: document.getElementById('new-icon').value,
                tipe: document.getElementById('new-tipe').value,
                target: document.getElementById('new-target').value
            };
            let res = await fetchAPI("addBrankas", data);
            alert(res.message);
            location.reload();
        }

        // PWA INIT
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

        function changeView(type) {
            let grid = document.getElementById('menu-grid');
            
            // 1. Bersihkan kelas tampilan lama
            grid.classList.remove('view-grid', 'view-large', 'view-list');
            
            // 2. Pasang kelas tampilan baru
            grid.classList.add('view-' + type);
            
            // 3. Ubah status tombol aktif/menyala
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-view-' + type).classList.add('active');
            
            // 4. Cerdas: Simpan pilihan user ke memori HP agar tidak berubah saat di-refresh
            localStorage.setItem('brankas_view_pref', type);
        }

        // Jalankan pengecekan preferensi otomatis saat sukses login
        // Sembari merender menu, panggil baris ini di akhir fungsi login Anda:
        const savedView = localStorage.getItem('brankas_view_pref') || 'grid';
        changeView(savedView);
    </script>
</body>
</html>
