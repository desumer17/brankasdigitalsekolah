<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brankas Digital - SDN 17 Dauh Puri</title>
    <link rel="icon" type="image/png" href="logo-sekolah.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --primary: #00a884; --text: #fff; --sub: #8b949e; --border: #30363d; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        .hidden { display: none !important; }
        input, button, select { width: 100%; box-sizing: border-box; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        button { background: var(--primary); color: #000; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        button:disabled { background: var(--sub); cursor: not-allowed; }
        
        #login-page { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .login-box { background: var(--card); padding: 40px 30px; border-radius: 20px; text-align: center; width: 100%; max-width: 350px; border: 1px solid var(--border); }
        .login-box img { width: 80px; margin-bottom: 10px; }
        .login-box h2 { margin: 0; color: var(--primary); }
        .login-box p { margin: 5px 0 25px; color: var(--sub); font-size: 14px; }
        .footer { margin-top: 30px; color: var(--sub); font-size: 12px; }

        #dashboard-page { padding: 20px; max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .card i { font-size: 30px; color: var(--primary); margin-bottom: 10px; }
        .card h3 { font-size: 14px; margin: 0; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 15px; width: 100%; max-width: 650px; max-height: 92vh; overflow-y: auto; border: 1px solid var(--border); }
        
        .modal-tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 15px; gap: 5px; }
        .tab-link { flex: 1; padding: 12px; text-align: center; background: none; border: none; color: var(--sub); font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 8px 8px 0 0; transition: 0.2s; margin-bottom: 0; }
        .tab-link:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .tab-link.active-tab { border-bottom: 3px solid var(--primary); color: var(--primary); background: rgba(0, 168, 132, 0.1); }

        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--bg); margin-bottom: 8px; border-radius: 8px; border: 1px solid var(--border); }
        .file-item a { color: var(--text); text-decoration: none; font-size: 14px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 10px; }
        .action-btns button { width: auto; padding: 6px 12px; margin: 0 0 0 5px; font-size: 12px; }

        .subfolder-wrapper { margin-bottom: 15px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .subfolder-btn { width: auto; padding: 6px 14px; margin-bottom: 0; margin-right: 6px; background: #21262d; border: 1px solid var(--border); color: var(--sub); font-size: 12px; font-weight: 500; border-radius: 6px; transition: 0.2s; cursor: pointer; }
        .subfolder-btn:hover { border-color: var(--primary); color: #fff; }
        .subfolder-btn.active { background: var(--primary) !important; color: #000 !important; font-weight: bold; border-color: var(--primary) !important; }

        .view-switcher { display: flex; justify-content: flex-end; gap: 6px; margin-bottom: 15px; }
        .view-btn { width: auto; padding: 6px 12px; margin-bottom: 0; background: var(--card); border: 1px solid var(--border); color: var(--sub); font-size: 12px; font-weight: 500; border-radius: 6px; transition: 0.2s; }
        .view-btn.active { background: var(--primary); color: #000; font-weight: bold; border-color: var(--primary); }

        .grid.view-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .grid.view-grid .card { height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .grid.view-grid .card i { font-size: 26px; margin-bottom: 8px; }
        .grid.view-grid .card h3 { font-size: 13px; text-align: center; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; }

        .grid.view-large { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .grid.view-large .card { height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; }
        .grid.view-large .card i { font-size: 40px; margin-bottom: 12px; }
        .grid.view-large .card h3 { font-size: 15px; text-align: center; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; }

        .grid.view-list { grid-template-columns: 1fr; gap: 8px; }
        .grid.view-list .card { height: 55px; display: flex; flex-direction: row; justify-content: flex-start; align-items: center; padding: 0 20px; text-align: left; }
        .grid.view-list .card i { font-size: 20px; margin-bottom: 0; margin-right: 15px; }
        .grid.view-list .card h3 { font-size: 14px; text-align: left; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; }
        
        @media (max-width: 480px) {
            #login-page { padding: 10px; }
            .login-box { width: 85%; padding: 25px 20px; border-radius: 16px; }
            input, button, select { padding: 10px; font-size: 13px; margin-bottom: 10px; }
            .header h2 { font-size: 16px; }
            #user-info { font-size: 11px; }
            .grid.view-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .grid.view-grid .card { height: 85px; padding: 5px; }
            .grid.view-grid .card i { font-size: 20px; }
            .grid.view-grid .card h3 { font-size: 10px; }
            .grid.view-large { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .modal-content { padding: 15px; border-radius: 12px; }
            .tab-link { font-size: 12px; padding: 10px 5px; }
        }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-box">
            <img src="logo-sekolah.png" alt="Logo Sekolah" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2201/2201557.png'">
            <h2>Brankas Digital</h2>
            <p>SD Negeri 17 Dauh Puri</p>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button id="btn-login" onclick="login()">Masuk</button>
        </div>
        <div class="footer">Copyright 2026 3D Creative</div>
    </div>

    <div id="dashboard-page" class="hidden">
        <div class="header">
            <div>
                <h2 style="margin:0; color:var(--primary);">Dashboard</h2>
                <span id="user-info" style="color:var(--sub); font-size:14px;"></span>
            </div>
            <div>
                <button id="btn-admin" class="hidden" onclick="openAdminModal()" style="width:auto; margin-right:5px;">+ Tambah Brankas</button>
                <button id="btn-refresh-cache" class="hidden" onclick="bersihkanCacheServer()" style="width:auto; margin-right:5px; background:#ff9800; color:#000;"><i class="fas fa-sync-alt"></i> Refresh Data</button>
                <button onclick="location.reload()" style="width:auto; background:#d73a49; color:#fff;">Keluar</button>
            </div>
        </div>

        <div class="view-switcher">
            <button id="btn-view-grid" class="view-btn active" onclick="changeView('grid')"><i class="fas fa-th"></i> Grid</button>
            <button id="btn-view-large" class="view-btn" onclick="changeView('large')"><i class="fas fa-th-large"></i> Besar</button>
            <button id="btn-view-list" class="view-btn" onclick="changeView('list')"><i class="fas fa-list"></i> List</button>
        </div>

        <div class="grid view-grid" id="menu-grid"></div>
    </div>

    <div id="folder-modal" class="modal hidden">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h2 id="folder-title" style="margin:0; font-size:18px; color:var(--primary);">Nama Brankas</h2>
                <i class="fas fa-times" style="cursor:pointer; font-size:22px; color:var(--sub);" onclick="closeModal('folder-modal')"></i>
            </div>
            
            <div id="subfolder-area" class="subfolder-wrapper hidden"></div>

            <div class="modal-tabs">
                <button id="tab-view" class="tab-link active-tab" onclick="switchModalTab('view')"><i class="fas fa-folder-open"></i> Lihat Berkas</button>
                <button id="tab-upload" class="tab-link" onclick="switchModalTab('upload')"><i class="fas fa-cloud-upload-alt"></i> Upload Berkas</button>
            </div>

            <div id="panel-view-files">
                <input type="text" id="search-bar" placeholder="Cari nama dokumen..." onkeyup="filterFiles()" style="padding:10px; margin-bottom:12px;">
                <div id="file-list">Menghubungkan ke server...</div>
            </div>

            <div id="panel-upload-files" class="hidden" style="background: rgba(0,0,0,0.2); padding:15px; border-radius:10px; border: 1px solid var(--border);">
                <h4 style="margin-top:0; color:#fff;"><i class="fas fa-file-upload"></i> Unggah Dokumen Baru</h4>
                <label style="font-size:12px; color:var(--sub);">Nama Label Berkas</label>
                <input type="text" id="up-nama" placeholder="Contoh: RPP_Matematika_Smt1">
                
                <label style="font-size:12px; color:var(--sub);">Tanggal Dokumen</label>
                <input type="date" id="up-tanggal">
                
                <label style="font-size:12px; color:var(--sub);">Pilih Berkas Komputer/HP</label>
                <input type="file" id="up-files" multiple style="background:var(--card); padding:8px;">
                
                <button id="btn-upload" onclick="uploadFiles()" style="margin-top:5px;"><i class="fas fa-share-square"></i> Mulai Unggah Sekarang</button>
                <div id="upload-status" style="font-size:13px; color:var(--primary); font-weight:bold; margin-top:10px; text-align:center;"></div>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Tambah Brankas / Ikon Baru</h2>
            <input type="text" id="new-nama" placeholder="Nama Brankas (Cth: Prestasi Siswa)">
            <input type="text" id="new-icon" placeholder="Kode Ikon FontAwesome (Cth: fa-trophy)">
            <select id="new-tipe">
                <option value="folder">Folder Google Drive</option>
                <option value="link">Link Web Aplikasi Lain</option>
            </select>
            <input type="text" id="new-target" placeholder="ID Folder Drive / Tautan URL">
            <button onclick="simpanBrankasBaru()">Simpan Brankas</button>
            <button style="background:transparent; border:1px solid var(--border); color:var(--text);" onclick="closeModal('admin-modal')">Batal</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwF_oVdNGmEcHqmj2wgSGFDdewAWdqkvFgYtVw9QxKpo5oW8azROlYM73b4hopW0XMfJg/exec";
        
        let CONFIG_SUBFOLDERS = {};
        let currentUser = {};
        let currentFolderId = "";
        let currentFolderName = "";
        let mainFolderId = "";
        let mainFolderName = "";
        let filesData = [];

        async function fetchAPI(action, payload = {}) {
            payload.action = action;
            let res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
            return await res.json();
        }

        async function login() {
            let u = document.getElementById('username').value;
            let p = document.getElementById('password').value;
            if(!u || !p) return alert("Form Username & Password wajib diisi!");
            
            let btn = document.getElementById('btn-login'); 
            btn.innerText = "Membuka Otoritas...";
            btn.disabled = true;

            let res = await fetchAPI("login", { username: u, password: p });
            
            if(res.status === "SUCCESS") {
                currentUser = res.data.user;
                CONFIG_SUBFOLDERS = res.data.subfolders || {};

                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('dashboard-page').classList.remove('hidden');
                document.getElementById('user-info').innerText = `${currentUser.nama} (${currentUser.peran})`;
                
                if(currentUser.peran === "SuperAdmin") {
                    document.getElementById('btn-admin').classList.remove('hidden');
                    document.getElementById('btn-refresh-cache').classList.remove('hidden');
                }

                let grid = document.getElementById('menu-grid');
                grid.innerHTML = "";
                
                if(currentUser.personalFolder) {
                    res.data.brankas.unshift({nama: "Brankas Pribadi", icon: "fa-user-lock", tipe: "folder", target: currentUser.personalFolder});
                }

                res.data.brankas.forEach(b => {
                    grid.innerHTML += `
                        <div class="card" onclick="openBrankas('${b.tipe}', '${b.target}', '${b.nama}')">
                            <i class="fas ${b.icon || 'fa-folder'}"></i>
                            <h3>${b.nama}</h3>
                        </div>`;
                });
            } else { 
                alert(res.message); 
                btn.innerText = "Masuk"; 
                btn.disabled = false;
            }
        }

        async function bersihkanCacheServer() {
            let btn = document.getElementById('btn-refresh-cache');
            let originalText = btn.innerHTML;
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Menyinkronkan...";
            btn.disabled = true;
            
            let res = await fetchAPI("clearCache", {});
            if(res.status === "SUCCESS") {
                alert("Data aplikasi berhasil disinkronkan dengan Google Sheet terbaru!");
                location.reload();
            } else {
                alert("Gagal menyinkronkan: " + res.message);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function switchModalTab(tabType) {
            document.querySelectorAll('.tab-link').forEach(el => el.classList.remove('active-tab'));
            if(tabType === 'view') {
                document.getElementById('tab-view').classList.add('active-tab');
                document.getElementById('panel-view-files').classList.remove('hidden');
                document.getElementById('panel-upload-files').classList.add('hidden');
            } else {
                document.getElementById('tab-upload').classList.add('active-tab');
                document.getElementById('panel-view-files').classList.add('hidden');
                document.getElementById('panel-upload-files').classList.remove('hidden');
            }
        }

        function renderSubfolderNavigation() {
            let area = document.getElementById('subfolder-area');
            let listSubs = CONFIG_SUBFOLDERS[mainFolderName];
            
            if(listSubs && listSubs.length > 0) {
                area.classList.remove('hidden');
                let htmlStr = `<span style="font-size:11px; color:var(--sub); display:block; margin-bottom:6px;"><i class="fas fa-sitemap"></i> Pilihan Sub-Folder:</span>`;
                htmlStr += `<div style="display:flex; gap:6px; flex-wrap:wrap;">`;
                
                let activeMainClass = (currentFolderId === mainFolderId) ? "active" : "";
                htmlStr += `<button class="subfolder-btn ${activeMainClass}" onclick="switchSubFolder('${mainFolderId}', '${mainFolderName}', this)">[ Utama ]</button>`;
                
                listSubs.forEach(sf => {
                    let activeSubClass = (currentFolderId === sf.idDrive) ? "active" : "";
                    htmlStr += `<button class="subfolder-btn ${activeSubClass}" onclick="switchSubFolder('${sf.idDrive}', '${sf.namaSub}', this)"><i class="fas fa-folder"></i> ${sf.namaSub}</button>`;
                });
                
                htmlStr += `</div>`;
                area.innerHTML = htmlStr;
            } else {
                area.innerHTML = "";
                area.classList.add('hidden');
            }
        }

        async function switchSubFolder(folderId, folderNama, btnElement) {
            document.querySelectorAll('.subfolder-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            
            currentFolderId = folderId;
            currentFolderName = folderNama;
            
            document.getElementById('file-list').innerHTML = "<i class='fas fa-spinner fa-spin'></i> Memuat berkas sub-folder...";
            switchModalTab('view');
            
            let res = await fetchAPI("getFiles", { folderId: folderId });
            if(res.status === "SUCCESS") {
                filesData = res.data;
                renderFiles(filesData);
            }
        }

        async function openBrankas(tipe, target, nama) {
            if(tipe === "link") return window.open(target, '_blank');
            
            mainFolderId = target;
            mainFolderName = nama;
            currentFolderId = target;
            currentFolderName = nama;
            
            document.getElementById('folder-title').innerText = nama;
            document.getElementById('folder-modal').classList.remove('hidden');
            
            switchModalTab('view');
            document.getElementById('file-list').innerHTML = "<i class='fas fa-circle-notch fa-spin'></i> Membuka Google Drive...";
            
            renderSubfolderNavigation();
            
            let res = await fetchAPI("getFiles", { folderId: target });
            if(res.status === "SUCCESS") {
                filesData = res.data;
                renderFiles(filesData);
            } else {
                document.getElementById('file-list').innerHTML = "Gagal memuat berkas: " + res.message;
            }
        }

        function renderFiles(list) {
            let html = "";
            let sorted = [...list].sort((a, b) => a.nama.localeCompare(b.nama, undefined, { sensitivity: 'base' }));
            
            sorted.forEach(f => {
                let trashButton = "";
                if (currentUser.peran === "SuperAdmin" || (currentUser.peran === "Guru" && mainFolderName === "Brankas Pribadi")) {
                    trashButton = `
                        <button onclick="deleteFile('${f.id}', '${f.nama}')" style="background:#d73a49; color:white; margin-left:5px;" title="Hapus Berkas">
                            <i class="fas fa-trash-alt"></i>
                        </button>`;
                }

                html += `
                <div class="file-item">
                    <a href="${f.url}" target="_blank" title="${f.nama}"><i class="fas fa-file-alt" style="color:var(--primary); margin-right:8px;"></i> ${f.nama}</a>
                    <div class="action-btns" style="display:flex;">
                        <button onclick="downloadFile('${f.id}', '${f.nama}')" style="background:#2ea043; color:white;" title="Download"><i class="fas fa-download"></i></button>
                        ${trashButton}
                    </div>
                </div>`;
            });
            document.getElementById('file-list').innerHTML = html || "Tidak ada berkas di dalam direktori folder ini.";
        }

        async function deleteFile(id, nama) {
            if(!confirm(`Apakah Anda yakin ingin menghapus file "${nama}" ke tempat sampah Google Drive?`)) return;
            
            document.getElementById('file-list').innerHTML = "Sedang menghapus berkas...";
            let res = await fetchAPI("deleteFile", { fileId: id });
            if(res.status === "SUCCESS") {
                let resRefresh = await fetchAPI("getFiles", { folderId: currentFolderId });
                if(resRefresh.status === "SUCCESS") {
                    filesData = resRefresh.data;
                    renderFiles(filesData);
                }
            } else { alert("Gagal menghapus: " + res.message); renderFiles(filesData); }
        }

        function filterFiles() {
            let q = document.getElementById('search-bar').value.toLowerCase();
            let filtered = filesData.filter(f => f.nama.toLowerCase().includes(q));
            renderFiles(filtered);
        }

        async function uploadFiles() {
            let files = document.getElementById('up-files').files;
            let namaInput = document.getElementById('up-nama').value;
            let tglInput = document.getElementById('up-tanggal').value;
            let btn = document.getElementById('btn-upload');
            
            if(files.length === 0) return alert("Harap tentukan file yang akan diupload!");
            
            btn.disabled = true;
            let statusEl = document.getElementById('upload-status');
            
            for(let i = 0; i < files.length; i++) {
                let file = files[i];
                let ext = file.name.split('.').pop();
                let formatNama = namaInput ? `${namaInput}_${tglInput}_${currentFolderName}.${ext}` : file.name;
                statusEl.innerText = `Mengunggah berkas (${i+1}/${files.length}). Jangan tutup halaman...`;

                let base64Data = await processFile(file);
                await fetchAPI("upload", {
                    folderId: currentFolderId,
                    fileName: formatNama,
                    mimeType: file.type || 'application/octet-stream',
                    base64: base64Data
                });
            }
            
            statusEl.innerText = "✓ Berkas berhasil diunggah!";
            document.getElementById('up-nama').value = '';
            document.getElementById('up-tanggal').value = '';
            document.getElementById('up-files').value = '';
            btn.disabled = false;
            
            setTimeout(async () => {
                statusEl.innerText = "";
                switchModalTab('view');
                document.getElementById('file-list').innerHTML = "Memperbarui daftar berkas...";
                let res = await fetchAPI("getFiles", { folderId: currentFolderId });
                if(res.status === "SUCCESS") { filesData = res.data; renderFiles(filesData); }
            }, 1200);
        }

        function processFile(file) {
            return new Promise((resolve) => {
                let reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function(e) {
                    if(file.type.startsWith('image/')) {
                        let img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            let canvas = document.createElement('canvas');
                            let ctx = canvas.getContext('2d');
                            let MAX_W = 1200, MAX_H = 1200;
                            let w = img.width, h = img.height;
                            if (w > h && w > MAX_W) { h *= MAX_W/w; w = MAX_W; }
                            else if (h > MAX_H) { w *= MAX_H/h; h = MAX_H; }
                            canvas.width = w; canvas.height = h;
                            ctx.drawImage(img, 0, 0, w, h);
                            let compressed = canvas.toDataURL('image/jpeg', 0.75);
                            resolve(compressed.split(',')[1]);
                        }
                    } else { resolve(e.target.result.split(',')[1]); }
                }
            });
        }

        async function downloadFile(id, nama) {
            let res = await fetchAPI("download", { fileId: id });
            if(res.status === "SUCCESS") {
                let a = document.createElement('a');
                a.href = "data:" + res.data.mimeType + ";base64," + res.data.base64;
                a.download = res.data.nama;
                a.click();
            } else { alert("Gagal mengunduh berkas."); }
        }

        function openAdminModal() { document.getElementById('admin-modal').classList.remove('hidden'); }
        function closeModal(id) { 
            document.getElementById(id).classList.add('hidden'); 
            if(id === 'folder-modal') { mainFolderId = ""; mainFolderName = ""; }
        }
        
        async function simpanBrankasBaru() {
            let data = {
                nama: document.getElementById('new-nama').value,
                icon: document.getElementById('new-icon').value,
                tipe: document.getElementById('new-tipe').value,
                target: document.getElementById('new-target').value
            };
            let res = await fetchAPI("addBrankas", data);
            alert(res.message);
            location.reload();
        }

        function changeView(type) {
            let grid = document.getElementById('menu-grid');
            grid.classList.remove('view-grid', 'view-large', 'view-list');
            grid.classList.add('view-' + type);
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            let activeBtn = document.getElementById('btn-view-' + type);
            if(activeBtn) activeBtn.classList.add('active');
            localStorage.setItem('brankas_view_pref', type);
        }

        const savedView = localStorage.getItem('brankas_view_pref') || 'grid';
        changeView(savedView);
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
